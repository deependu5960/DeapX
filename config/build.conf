# DeapX OS build configuration
DISTRIBUTION="trixie"
ARCHITECTURE="amd64"
ARCHIVE_AREAS="main contrib non-free non-free-firmware"
ISO_OUTPUT_NAME="deapx-os-${DISTRIBUTION}-amd64.iso"
LIVE_USERNAME="deapx"
LIVE_FULLNAME="DeapX Live User"
LIVE_PASSWORD="deapx"
HOSTNAME="deapx"
DOMAINNAME="local"
LOCALE_DEFAULT="en_US.UTF-8"
KEYMAP="us"
KERNEL_PACKAGES="linux-image-amd64"
FIRMWARE_PACKAGES="firmware-linux firmware-linux-nonfree"
PLYMOUTH_THEME="spinner"
GRUB_DEFAULT="0"
GRUB_TIMEOUT="5"
LB_MEMTEST="none"
LB_WIN32_LOADER="false"
LB_APT_INDICES="false"
LB_APT_RECOMMENDS="true"
LB_DEBIAN_INSTALLER="false"
LB_FIRMWARE_CHROOT="true"
LB_FIRMWARE_BINARY="true"
LB_INITRAMFS_COMPRESSION="gzip"
LB_LINUX_FLAVOURS="amd64"
LB_SECURITY="true"
LB_UPDATES="true"
LB_BACKPORTS="false"
MIN_DISK_SPACE_GB=20
MIN_RAM_GB=4
